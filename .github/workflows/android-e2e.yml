name: Android E2E

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      flow:
        description: "Maestro flow to run"
        type: choice
        required: true
        default: all
        options:
          - all
          - scratch
          - paybacks
          - templates
          - recurring

permissions:
  contents: read

concurrency:
  group: yuuka-android-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-e2e-apk:
    name: Build E2E APK
    runs-on: ubuntu-latest
    outputs:
      flows: ${{ steps.select-flows.outputs.flows }}
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Select Maestro flows
        id: select-flows
        env:
          FLOW_SELECTION: ${{ github.event.inputs.flow }}
        run: |
          selection="${FLOW_SELECTION:-all}"
          case "$selection" in
            scratch)
              flows='[{"id":"scratch","name":"Scratch lifecycle","flow":".maestro/01-scratch-lifecycle.yaml","artifact":"android-e2e-scratch-diagnostics"}]'
              ;;
            paybacks)
              flows='[{"id":"paybacks","name":"Payback delete reassign","flow":".maestro/02-payback-delete-reassign.yaml","artifact":"android-e2e-paybacks-diagnostics"}]'
              ;;
            templates)
              flows='[{"id":"templates","name":"Template application","flow":".maestro/03-template-application-draft.yaml","artifact":"android-e2e-templates-diagnostics"}]'
              ;;
            recurring)
              flows='[{"id":"recurring","name":"Recurring Bill import","flow":".maestro/04-recurring-bill-import.yaml","artifact":"android-e2e-recurring-diagnostics"}]'
              ;;
            all)
              flows='[{"id":"scratch","name":"Scratch lifecycle","flow":".maestro/01-scratch-lifecycle.yaml","artifact":"android-e2e-scratch-diagnostics"},{"id":"paybacks","name":"Payback delete reassign","flow":".maestro/02-payback-delete-reassign.yaml","artifact":"android-e2e-paybacks-diagnostics"},{"id":"templates","name":"Template application","flow":".maestro/03-template-application-draft.yaml","artifact":"android-e2e-templates-diagnostics"},{"id":"recurring","name":"Recurring Bill import","flow":".maestro/04-recurring-bill-import.yaml","artifact":"android-e2e-recurring-diagnostics"}]'
              ;;
            *)
              echo "Unsupported flow selection: $selection" >&2
              exit 64
              ;;
          esac
          echo "flows=$flows" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-java@v5.6.0
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "22.13.0"
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci
      - name: Prepare Android project
        working-directory: mobile
        run: |
          if [ ! -f android/settings.gradle ] || [ ! -f android/app/build.gradle ]; then
            npx expo prebuild --platform android --no-install
          fi
          mkdir -p android/app/src/release
          cat > android/app/src/release/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:tools="http://schemas.android.com/tools">

              <application android:usesCleartextTraffic="true" tools:targetApi="28" tools:replace="android:usesCleartextTraffic" />
          </manifest>
          EOF
      - name: Build bundled E2E APK
        working-directory: mobile/android
        env:
          EXPO_PUBLIC_E2E: "1"
          EXPO_PUBLIC_API_BASE_URL: http://localhost:8080/api/v1
        run: ./gradlew assembleRelease --no-daemon -PreactNativeArchitectures=x86_64
      - name: Verify bundled APK
        working-directory: mobile
        run: |
          apk="android/app/build/outputs/apk/release/app-release.apk"

          test -f "$apk"

          if ! unzip -Z1 "$apk" | grep -Eq '^(assets/index\.android\.bundle|assets/.+\.hbc)$'; then
            echo "Bundled JavaScript was not found in $apk" >&2
            unzip -Z1 "$apk" | grep '^assets/' || true
            exit 1
          fi

          mkdir -p ../artifacts/android-e2e-apk
          cp "$apk" ../artifacts/android-e2e-apk/app-e2e.apk
      - name: Upload E2E APK
        uses: actions/upload-artifact@v7
        with:
          name: android-e2e-apk
          if-no-files-found: error
          compression-level: 0
          path: artifacts/android-e2e-apk/app-e2e.apk

  run-e2e-flow:
    name: Android E2E (${{ matrix.name }})
    needs: build-e2e-apk
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.build-e2e-apk.outputs.flows) }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: yuuka_e2e
          POSTGRES_USER: yuuka
          POSTGRES_PASSWORD: e2e_database_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U yuuka -d yuuka_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/download-artifact@v4
        with:
          name: android-e2e-apk
          path: artifacts/android-e2e-apk
      - uses: actions/setup-java@v5.6.0
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: Start disposable demo API
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/yuuka_e2e
          SPRING_DATASOURCE_USERNAME: yuuka
          SPRING_DATASOURCE_PASSWORD: e2e_database_password
          SPRING_PROFILES_ACTIVE: demo
          YUUKA_AUTH_REGISTRATION_ENABLED: "false"
          YUUKA_JWT_SECRET: e2e-only-jwt-secret-with-at-least-32-bytes
          YUUKA_OWNER_EMAIL: e2e@yuuka.local
          YUUKA_OWNER_BOOTSTRAP_PASSWORD: E2ePassword123
        run: |
          chmod +x gradlew
          nohup ./gradlew bootRun --no-daemon > ../backend-e2e-${{ matrix.id }}.log 2>&1 &
          for attempt in {1..60}; do
            curl --fail --silent http://127.0.0.1:8080/health/ready && exit 0
            sleep 2
          done
          cat ../backend-e2e-${{ matrix.id }}.log
          exit 1
      - name: Install Maestro 2.6.1
        run: |
          curl --fail --location --silent --show-error \
            https://github.com/mobile-dev-inc/Maestro/releases/download/cli-2.6.1/maestro.zip \
            --output maestro.zip
          unzip -q maestro.zip -d "$HOME/.maestro"
          echo "$HOME/.maestro/maestro/bin" >> "$GITHUB_PATH"
      - name: Free disk before emulator
        run: |
          df -h
          rm -rf mobile/android/.gradle mobile/android/build mobile/android/app/build || true
          sudo rm -rf /usr/local/lib/android/sdk/ndk || true
          df -h
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run Maestro flow
        uses: reactivecircus/android-emulator-runner@v2.38.0
        env:
          CI: "1"
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_7
          disable-animations: false
          script: bash .github/scripts/android-e2e.sh "${{ matrix.flow }}" "artifacts/android-e2e-apk/app-e2e.apk"
      - name: Upload Android E2E diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: ignore
          path: |
            backend-e2e-${{ matrix.id }}.log
            artifacts/android-e2e
