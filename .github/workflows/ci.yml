name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    concurrency:
      group: yuuka-ci-${{ github.workflow }}-${{ github.ref }}-backend
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: Make Gradle wrapper executable
        run: chmod +x backend/gradlew
      - name: Check, PostgreSQL integration, coverage, and contract
        working-directory: backend
        run: ./gradlew check --no-daemon
      - name: Mutation testing
        working-directory: backend
        run: ./gradlew pitest --no-daemon
      - name: Package backend with CI build metadata
        working-directory: backend
        run: ./gradlew bootJar --no-daemon -PyuukaVersion=0.0.0-ci+${{ github.sha }}
      - name: Upload backend reports
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: backend-reports
          path: |
            backend/build/reports/tests/
            backend/build/reports/jacoco/
            backend/build/reports/pitest/
            backend/build/generated/openapi.json
          if-no-files-found: ignore
          retention-days: 14
      - name: Upload backend jar
        uses: actions/upload-artifact@v4.6.2
        with:
          name: backend-jar
          path: backend/build/libs/backend-*.jar
          if-no-files-found: error
          retention-days: 14

  mobile:
    name: Mobile
    runs-on: ubuntu-latest
    concurrency:
      group: yuuka-ci-${{ github.workflow }}-${{ github.ref }}-mobile
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "22.13.0"
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Install dependencies
        working-directory: mobile
        run: npm ci
      - name: Format check
        working-directory: mobile
        run: npm run format:check
      - name: Lint
        working-directory: mobile
        run: npm run lint
      - name: Typecheck
        working-directory: mobile
        run: npm run typecheck
      - name: Test
        working-directory: mobile
        run: npm run test:coverage
      - name: Expo Doctor
        working-directory: mobile
        run: npx expo-doctor
      - name: Export Android bundle
        working-directory: mobile
        run: npx expo export --platform android --output-dir dist/android
      - name: Production dependency audit
        working-directory: mobile
        run: npm audit --omit=dev --audit-level=high
      - name: Upload mobile reports and export
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: mobile-reports
          path: |
            mobile/coverage/
            mobile/dist/android/
          if-no-files-found: ignore
          retention-days: 14

  infrastructure:
    name: Infrastructure
    runs-on: ubuntu-latest
    concurrency:
      group: yuuka-ci-${{ github.workflow }}-${{ github.ref }}-infrastructure
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Validate Compose configuration
        run: docker compose config --quiet
      - name: Build hardened backend image
        env:
          YUUKA_VERSION: 0.0.0-ci
        run: docker compose build backend

  release:
    name: Release
    runs-on: ubuntu-latest
    needs:
      - backend
      - mobile
      - infrastructure
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write
    concurrency:
      group: yuuka-release-master
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: Make Gradle wrapper executable
        run: chmod +x backend/gradlew
      - name: Calculate release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          existing="$(git tag --points-at HEAD --list 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n 1 || true)"
          if [[ -n "$existing" ]]; then
            echo "Current commit already has release tag $existing"
            echo "tag=$existing" >> "$GITHUB_OUTPUT"
            echo "version=${existing#v}" >> "$GITHUB_OUTPUT"
            echo "already_tagged=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n 1 || true)"
          if [[ -z "$latest" ]]; then
            next="v1.0.0"
          else
            version="${latest#v}"
            IFS='.' read -r major minor patch <<< "$version"
            next="v${major}.${minor}.$((patch + 1))"
          fi

          echo "Next release tag is $next"
          echo "tag=$next" >> "$GITHUB_OUTPUT"
          echo "version=${next#v}" >> "$GITHUB_OUTPUT"
          echo "already_tagged=false" >> "$GITHUB_OUTPUT"
      - name: Package backend release jar
        working-directory: backend
        run: ./gradlew bootJar --no-daemon -PyuukaVersion=${{ steps.version.outputs.version }}
      - name: Publish tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          ALREADY_TAGGED: ${{ steps.version.outputs.already_tagged }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          previous_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' | grep -v "^${RELEASE_TAG}$" | sort -V | tail -n 1 || true)"
          if [[ -n "$previous_tag" ]]; then
            changelog_range="${previous_tag}..HEAD"
          else
            changelog_range="HEAD"
          fi

          {
            echo "## ${RELEASE_TAG}"
            echo
            echo "- Version: ${RELEASE_VERSION}"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo "## Changes"
            git log "$changelog_range" --no-merges --format='- %s (%h)' || true
          } > release-notes.md

          if [[ "$ALREADY_TAGGED" != "true" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$RELEASE_TAG" -m "Release ${RELEASE_TAG}

          Commit: ${GITHUB_SHA}"
            if ! git push origin "refs/tags/${RELEASE_TAG}"; then
              git fetch --tags --force
              if git tag --points-at HEAD --list "$RELEASE_TAG" | grep -q "^${RELEASE_TAG}$"; then
                echo "Tag ${RELEASE_TAG} was published by another run for this commit."
              else
                echo "Failed to publish ${RELEASE_TAG}; refusing to create a release for an unknown tag state."
                exit 1
              fi
            fi
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists; refreshing safe generated assets."
            gh release upload "$RELEASE_TAG" backend/build/libs/backend-*.jar docs/openapi.json --clobber
          else
            gh release create "$RELEASE_TAG" backend/build/libs/backend-*.jar docs/openapi.json \
              --title "$RELEASE_TAG" \
              --notes-file release-notes.md
          fi
