name: Dependency Review

on:
  pull_request:
    branches:
      - master

concurrency:
  group: yuuka-dependency-review-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
