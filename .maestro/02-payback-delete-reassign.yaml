appId: com.yuuka.mobile
name: Payback delete unassigns entry
---
- runFlow: shared/sign-in.yaml
- tapOn: "Open app menu"
- tapOn: "Open Paybacks"
- tapOn: "New Payback"
- tapOn:
    text: "Name"
    index: 1
- inputText: "E2E Delete Source"
- tapOn:
    text: "Original amount owed"
    index: 1
- inputText: "40.00"
- tapOn:
    text: "Balance when tracking began"
    index: 1
- eraseText
- inputText: "40.00"
- scrollUntilVisible:
    centerElement: true
    element: "Create Payback"
    direction: DOWN
- tapOn: "Create Payback"
- extendedWaitUntil:
    visible: "E2E Delete Source"
    timeout: 10000
- tapOn: "Back"

- tapOn: "New Payback"
- tapOn:
    text: "Name"
    index: 1
- inputText: "E2E Delete Target"
- tapOn:
    text: "Original amount owed"
    index: 1
- inputText: "40.00"
- tapOn:
    text: "Balance when tracking began"
    index: 1
- eraseText
- inputText: "40.00"
- scrollUntilVisible:
    centerElement: true
    element: "Create Payback"
    direction: DOWN
- tapOn: "Create Payback"
- extendedWaitUntil:
    visible: "E2E Delete Target"
    timeout: 10000
- back
- back
- extendedWaitUntil:
    visible: "New paycheck"
    timeout: 10000
- tapOn: "New paycheck"
- tapOn:
    text: "Name"
    index: 1
- inputText: "E2E Payback Assign"
- tapOn:
    text: "Exact paycheck amount"
    index: 1
- inputText: "40.00"
- scrollUntilVisible:
    centerElement: true
    element: "Create paycheck"
    direction: DOWN
- tapOn: "Create paycheck"
- extendedWaitUntil:
    visible: "E2E Payback Assign"
    timeout: 10000
- tapOn: "Add entry"
- tapOn:
    text: "Name"
    index: 1
- inputText: "Repay Payback"
- tapOn:
    text: "Amount"
    index: 1
- inputText: "10.00"
- scrollUntilVisible:
    centerElement: true
    element: "Apply to Payback, selected No Payback"
    direction: DOWN
- tapOn: "Apply to Payback, selected No Payback"
- tapOn: "E2E Delete Source"
- scrollUntilVisible:
    centerElement: true
    element: "Save entry"
    direction: DOWN
- tapOn: "Save entry"
- extendedWaitUntil:
    visible: "Add entry"
    timeout: 10000

- back
- extendedWaitUntil:
    visible: "New paycheck"
    timeout: 10000
- tapOn: "Open app menu"
- tapOn: "Open Paybacks"
- tapOn: 'E2E Delete Source, \$40\.00 left, 0 percent repaid since tracking began'
- tapOn: "Delete"
- extendedWaitUntil:
    visible: "Paybacks"
    timeout: 10000
- assertNotVisible: "E2E Delete Source"

- tapOn: "Active tab"
- extendedWaitUntil:
    visible: "E2E Payback Assign"
    timeout: 10000
- tapOn: 'E2E Payback Assign, \$40\.00, \$30\.00 unallocated'
- scrollUntilVisible:
    centerElement: true
    element: "Edit Repay Payback"
    direction: DOWN
- tapOn: "Edit Repay Payback"
- scrollUntilVisible:
    centerElement: true
    element: "Apply to Payback, selected No Payback"
    direction: DOWN
- assertVisible: "No Payback"
- tapOn: "Apply to Payback, selected No Payback"
- tapOn: "E2E Delete Target"
- scrollUntilVisible:
    centerElement: true
    element: "Save entry"
    direction: DOWN
- tapOn: "Save entry"
- extendedWaitUntil:
    visible: "Repay Payback"
    timeout: 10000
