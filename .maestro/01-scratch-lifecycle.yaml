appId: com.yuuka.mobile
name: Scratch paycheck lifecycle
---
- runFlow: shared/sign-in.yaml
- tapOn: "New paycheck"
- tapOn:
    text: "Name"
    index: 1
- inputText: "E2E Scratch"
- tapOn:
    text: "Exact paycheck amount"
    index: 1
- inputText: "200.00"
- scrollUntilVisible:
    centerElement: true
    element: "Create paycheck"
    direction: DOWN
- tapOn: "Create paycheck"
- extendedWaitUntil:
    visible: "E2E Scratch"
    timeout: 10000

- tapOn: "Add entry"
- tapOn:
    text: "Name"
    index: 1
- inputText: "Phone"
- tapOn:
    text: "Amount"
    index: 1
- inputText: "50.00"
- scrollUntilVisible:
    centerElement: true
    element: "Save entry"
    direction: DOWN
- tapOn: "Save entry"
- extendedWaitUntil:
    visible: "Phone"
    timeout: 10000
- extendedWaitUntil:
    visible: "Add entry"
    timeout: 10000

- tapOn: "Add entry"
- tapOn: "Spending Bucket"
- tapOn:
    text: "Name"
    index: 1
- inputText: "Food"
- tapOn:
    text: "Budget amount"
    index: 1
- inputText: "150.00"
- pressKey: Enter
- scrollUntilVisible:
    centerElement: true
    element: "Save entry"
    direction: DOWN
- tapOn: "Save entry"
- extendedWaitUntil:
    visible: "Add entry"
    timeout: 10000

- scrollUntilVisible:
    centerElement: true
    element: "Move Food up"
    direction: DOWN
- tapOn: "Move Food up"
- tapOn: "Change status for Phone"
- tapOn: "Processing"
- tapOn:
    text: "Note (optional)"
    index: 1
- inputText: "Scheduled"
- runFlow:
    when:
      visible: "Return"
    commands:
      - hideKeyboard
- tapOn:
    text: "Effective date and time"
    point: "90%,50%"
- eraseText: 100
- inputText: "2026-07-16T12:00:00Z"
- pressKey: Enter
- tapOn: "Save status"
- extendedWaitUntil:
    visible: "Status: Processing"
    timeout: 10000

- tapOn: "Change status for Phone"
- tapOn: "Posted"
- tapOn: "Save status"
- extendedWaitUntil:
    visible: "Status: Posted"
    timeout: 10000

- tapOn: "Change status for Food"
- tapOn: "Posted"
- tapOn: "Save status"
- extendedWaitUntil:
    visible: "Reopen paycheck"
    timeout: 10000

- tapOn: "View status history for Phone"
- assertVisible: "Not Paid"
- assertVisible: "Processing"
- assertVisible: "Posted"
- back
- extendedWaitUntil:
    visible: "Reopen paycheck"
    timeout: 10000
- back
- tapOn: "History tab"
- extendedWaitUntil:
    visible: "E2E Scratch"
    timeout: 10000
- tapOn: 'E2E Scratch, \$200\.00, \$0\.00 unallocated'
- tapOn: "Reopen paycheck"
- extendedWaitUntil:
    visible: "Add entry"
    timeout: 10000
