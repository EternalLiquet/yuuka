spring:
  application:
    name: yuuka-backend
  jackson:
    deserialization:
      fail-on-unknown-properties: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/yuuka}
    username: ${SPRING_DATASOURCE_USERNAME:yuuka}
    password: ${SPRING_DATASOURCE_PASSWORD:yuuka_dev_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 1MB
      max-request-size: 1MB
  mvc:
    log-request-details: false

management:
  endpoint:
    health:
      show-details: never
  endpoints:
    web:
      exposure:
        include: health

server:
  port: ${PORT:8080}
  server-header:
  error:
    include-binding-errors: never
    include-exception: false
    include-message: never
    include-stacktrace: never
    whitelabel:
      enabled: false
  max-http-request-header-size: 16KB
  tomcat:
    max-http-form-post-size: 16KB
    max-swallow-size: 16KB

yuuka:
  cors:
    allowed-origins: ${YUUKA_CORS_ALLOWED_ORIGINS:http://localhost:8081,http://localhost:19006,http://127.0.0.1:8081,http://127.0.0.1:19006}
  http:
    max-request-body-size-bytes: ${YUUKA_HTTP_MAX_REQUEST_BODY_SIZE_BYTES:65536}
  auth:
    registration-enabled: ${YUUKA_AUTH_REGISTRATION_ENABLED:false}
    rate-limit:
      max-attempts: ${YUUKA_AUTH_RATE_LIMIT_MAX_ATTEMPTS:5}
      window: ${YUUKA_AUTH_RATE_LIMIT_WINDOW:PT15M}
      max-tracked-keys: ${YUUKA_AUTH_RATE_LIMIT_MAX_TRACKED_KEYS:10000}
  jwt:
    issuer: ${YUUKA_JWT_ISSUER:yuuka}
    audience: ${YUUKA_JWT_AUDIENCE:yuuka-api}
    secret: ${YUUKA_JWT_SECRET:change-me-to-a-32-byte-minimum-secret}
    access-token-ttl: ${YUUKA_JWT_ACCESS_TOKEN_TTL:PT15M}
    refresh-token-ttl: ${YUUKA_JWT_REFRESH_TOKEN_TTL:P30D}
  owner:
    email: ${YUUKA_OWNER_EMAIL:}
    password-hash: ${YUUKA_OWNER_PASSWORD_HASH:}
    bootstrap-password: ${YUUKA_OWNER_BOOTSTRAP_PASSWORD:}
    totp-secret: ${YUUKA_OWNER_TOTP_SECRET:}

springdoc:
  api-docs:
    path: /api/openapi
  swagger-ui:
    enabled: false
